<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity 6 ShaderGraph to GLSL Transpiler</title>
  <meta name="description" content="Convert Unity 6 ShaderGraph assets to standard GLSL shader code with live WebGL 3D preview and interactive viewport.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Google+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Monaco Editor Loader script -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body>

  <div id="app">
    <!-- Navbar Header -->
    <header class="navbar">
      <div class="brand">
        <div class="brand-logo" style="background:transparent; border:none; box-shadow:none; padding:0;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div class="brand-title">ShaderGraph &rarr; GLSL Converter</div>
        <span class="brand-tag">Unity 6</span>
      </div>

      <div class="nav-actions">
        <label for="preset-select" style="font-size:12px; color:var(--text-muted); font-weight:500;">Preset:</label>
        <select id="preset-select" class="select-input" aria-label="Select ShaderGraph Preset">
          <option value="dissolve" selected>Dissolve Effect</option>
          <option value="hologram">Hologram Scanlines</option>
          <option value="linear-gradient">Linear Gradient</option>
          <option value="pbr-rimlight">PBR Rimlight</option>
          <option value="voronoi">Voronoi Noise</option>
          <option value="parallax-mapping">Parallax Mapping 3D</option>
          <option value="checkerboard">Checkerboard Pattern</option>
          <option value="tiling-offset">UV Tiling & Offset</option>
          <option value="polar-coordinates">Polar Coordinates Swirl</option>
          <option value="toon-ramp">Toon Cel Shading</option>
          <option value="normal-blend">Normal Strength & Blend</option>
        </select>

        <button id="btn-open-import" class="btn btn-primary" aria-label="Import ShaderGraph File">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><polyline points="14 2 14 8 20 8"/><path d="M12 12v6"/><polyline points="9 15 12 12 15 15"/></svg>
          Import .shadergraph
        </button>
      </div>
    </header>

    <!-- Main Split Layout -->
    <main id="main-content" class="main-content">

      <!-- Left Panel: Graph Inspector & Properties -->
      <aside id="left-panel" class="panel panel-left">
        <div class="panel-header">
          <span class="panel-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/><line x1="2" x2="6" y1="14" y2="14"/><line x1="10" x2="14" y1="8" y2="8"/><line x1="18" x2="22" y1="16" y2="16"/></svg>
            Graph Inspector
          </span>
          <button id="btn-toggle-left-panel" class="panel-toggle-btn" title="Collapse Left Sidebar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </button>
        </div>
        <div class="panel-body">
          <div class="prop-group">
            <div class="prop-label">Exposed Uniform Properties</div>
            <div id="properties-container">
              <!-- Dynamically populated -->
            </div>
          </div>

          <div class="prop-group" style="margin-top: 24px;">
            <div class="prop-label">Graph Nodes Topology</div>
            <div id="nodes-container">
              <!-- Dynamically populated -->
            </div>
          </div>
        </div>
      </aside>

      <!-- Center Panel: Viewport Area (3D Shader Preview / 2D Graph View) -->
      <section class="viewport-panel">
        <!-- Floating Restore Sidebar Buttons -->
        <button id="expand-left-btn" class="floating-expand-btn left" title="Open Graph Inspector Sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m14 9 3 3-3 3"/></svg>
        </button>
        <button id="expand-right-btn" class="floating-expand-btn right" title="Open Code Editor Sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M15 3v18"/><path d="m10 9-3 3 3 3"/></svg>
        </button>

        <!-- Viewport Toolbar Header with Tab Switcher -->
        <div class="viewport-toolbar">
          <div class="viewport-tabs">
            <button id="tab-view-3d" class="tab-btn active" aria-label="3D Shader Preview Tab">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
              3D Shader Preview
            </button>
            <button id="tab-view-2d" class="tab-btn" aria-label="2D Graph View Tab">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v1a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><path d="M12 12v3"/></svg>
              2D Graph View
            </button>
          </div>

          <div class="viewport-controls" style="display:flex; align-items:center; gap:12px;">
            <label class="toggle-switch-label" title="Toggle 3D mesh auto-rotation" style="margin:0;">
              <input type="checkbox" id="toggle-rotate" class="toggle-switch-input" checked>
              <span class="toggle-switch-slider"></span>
              <span class="toggle-switch-text">Rotate</span>
            </label>

            <div style="display:flex; align-items:center; gap:6px;">
              <label for="mesh-select" style="font-size:12px; color:var(--text-muted); font-weight:500;">Mesh:</label>
              <select id="mesh-select" class="select-input" aria-label="Select 3D Preview Geometry">
                <option value="sphere" selected>Sphere</option>
                <option value="cube">Cube</option>
                <option value="torus">Torus Knot</option>
                <option value="plane">Quad / Plane</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Viewport Containers -->
        <div class="viewport-content">
          <!-- 3D WebGL Shader View -->
          <div id="view-3d" class="viewport-view active">
            <div id="canvas-3d-container" style="width:100%; height:100%;"></div>
          </div>

          <!-- 2D Graph Canvas View (Prepared Tab) -->
          <div id="view-2d" class="viewport-view">
            <div id="graph-2d-container"></div>
          </div>
        </div>
      </section>

      <!-- Right Panel: Monaco GLSL Shader Code Editor -->
      <aside id="right-panel" class="panel panel-right" style="position:relative;">
        <div id="panel-resize-handle" class="panel-resize-handle"></div>
        <div class="panel-header">
          <button id="btn-toggle-right-panel" class="panel-toggle-btn" title="Collapse Right Sidebar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>

          <span class="panel-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
            GLSL Code
          </span>

          <div class="code-header-actions">
            <!-- Editable Toggle Switch -->
            <label class="toggle-switch-label" title="Toggle live GLSL editing mode">
              <input type="checkbox" id="toggle-editable" class="toggle-switch-input">
              <span class="toggle-switch-slider"></span>
              <span class="toggle-switch-text">Editable</span>
            </label>

            <div class="code-tabs">
              <button class="code-tab" data-tab="vertex">Vertex</button>
              <button class="code-tab active" data-tab="fragment">Fragment</button>
              <button class="code-tab" data-tab="full">Full GLSL</button>
            </div>

            <button id="btn-copy-code" class="btn btn-secondary btn-sm" title="Copy to Clipboard" aria-label="Copy Code">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            </button>
            <button id="btn-download-glsl" class="btn btn-secondary btn-sm" title="Download .glsl File" aria-label="Download GLSL File">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
            </button>
          </div>
        </div>

        <div class="panel-body" style="padding:0; position:relative; overflow:hidden;">
          <div id="monaco-editor-container" style="width:100%; height:100%;"></div>
        </div>
      </aside>

    </main>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" class="modal-overlay" aria-modal="true" role="dialog">
    <div class="modal-card">
      <div class="modal-header">
        <h3 style="font-size:16px; font-weight:700;">Import Unity 6 ShaderGraph</h3>
        <button id="btn-close-modal" class="btn btn-secondary btn-icon" aria-label="Close Modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="file-dropzone" class="dropzone">
          <div class="dropzone-icon" style="margin-bottom:8px;">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L8.6 3.3A2 2 0 0 0 6.9 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/><path d="M12 10v6"/><path d="m9 13 3-3 3 3"/></svg>
          </div>
          <p style="font-size:14px; font-weight:600; margin-bottom:4px;">Drag & Drop your .shadergraph file here</p>
          <p style="font-size:12px; color:var(--text-muted);">or click to browse local files</p>
          <input type="file" id="file-input" accept=".shadergraph,.json" style="display:none;">
        </div>

        <div style="margin: 16px 0 8px; font-size:12px; font-weight:600; color:var(--text-muted);">OR Paste ShaderGraph JSON:</div>
        <textarea id="json-textarea" class="json-textarea" placeholder="Paste Unity 6 .shadergraph JSON content here..."></textarea>

        <div style="margin-top:16px; display:flex; justify-content:flex-end; gap:8px;">
          <button id="btn-parse-text" class="btn btn-primary">Convert</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Application Entry Point -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
